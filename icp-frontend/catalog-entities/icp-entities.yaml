---
# ICP Integration Project System
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: icp-integration-platform
  title: ICP Integration Platform
  description: WSO2 Integration Control Plane system for managing integration components
  annotations:
    backstage.io/source-location: url:http://localhost:3000/projects
spec:
  owner: integration-team
  domain: integration

---
# Sample ICP Project as System
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: sample-integration-project
  title: Sample Integration Project
  description: Sample project containing integration components
  annotations:
    icp.wso2.com/project-id: sample-project-123
    backstage.io/source-location: url:http://localhost:3000/projects
spec:
  owner: integration-team
  domain: integration

---
# Sample ICP Component
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: music-service
  title: Music Service Component
  description: Integration component for music data processing
  annotations:
    icp.wso2.com/component-id: music-component-456
    icp.wso2.com/project-id: sample-project-123
    backstage.io/source-location: url:http://localhost:3000/icomponents
  links:
    - url: http://localhost:3000/runtimes?componentId=music-component-456
      title: View Runtimes
      icon: dashboard
    - url: http://localhost:3000/environment-overview?componentId=music-component-456
      title: Environment Overview
      icon: timeline
spec:
  type: service
  lifecycle: production
  owner: integration-team
  system: sample-integration-project

---
# Development Environment Resource
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: development-environment
  title: Development Environment
  description: Development environment for integration testing
  annotations:
    icp.wso2.com/environment-id: dev-env-789
    backstage.io/source-location: url:http://localhost:3000/environments
  links:
    - url: http://localhost:3000/environment-overview?environment=development
      title: Environment Overview
      icon: dashboard
spec:
  type: environment
  owner: integration-team
  system: icp-integration-platform

---
# Production Environment Resource
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: production-environment
  title: Production Environment
  description: Production environment for live integration services
  annotations:
    icp.wso2.com/environment-id: prod-env-101
spec:
  type: environment
  owner: integration-team
  system: icp-integration-platform

---
# Sample Runtime Resource
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: music-service-runtime-dev
  title: Music Service Runtime (Dev)
  description: Development runtime instance for music service
  annotations:
    icp.wso2.com/runtime-id: musicforweather
    icp.wso2.com/runtime-type: MI
    icp.wso2.com/status: RUNNING
    icp.wso2.com/component-id: music-component-456
    icp.wso2.com/environment-id: dev-env-789
  links:
    - url: http://localhost:3000/runtimes
      title: View All Runtimes
      icon: list
    - url: http://localhost:3000/environment-overview?runtimeId=musicforweather
      title: Runtime Details
      icon: info
spec:
  type: runtime
  owner: integration-team
  dependsOn:
    - component:music-service
    - resource:development-environment
