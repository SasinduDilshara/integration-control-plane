# ICP Server Configuration File
# This file contains all configurable parameters for the Integration Control Plane server

# =============================================================================
# SERVER CONFIGURATION
# =============================================================================
# HTTP server settings
# serverPort = 9445
# serverHost = "0.0.0.0"
# graphqlPort = 9090

# =============================================================================
# OPERATIONAL CONFIGURATION
# =============================================================================
# Runtime management settings
heartbeatTimeoutSeconds = 300  # 5 minutes
schedulerIntervalSeconds = 600  # 1 minute

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
# Logging and monitoring settings
logLevel = "INFO"  # Options: DEBUG, INFO, WARN, ERROR
enableAuditLogging = true
enableMetrics = true

# =============================================================================
# AUTHENTICATION BACKEND CONFIGURATION
# =============================================================================
# Authentication backend service settings
# URL of the authentication backend service (can be custom implementation)
authBackendUrl = "https://localhost:9447"
authBackendApiKey = "default-api-key"


# =============================================================================
# AUTH SERVICE CONFIGURATION
# =============================================================================
# Authorization service settings
defaultJwtHMACSecret = "default-secret-key-at-least-32-characters-long-for-hs256"


# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
[icp_server.storage]
# Primary database connection settings
dbHost = "mysql-db"
dbPort = 3306
dbName = "icp_database"
dbUser = "root"
dbPassword = "my-secret-pw"
dbType = "mysql"  # Options: mysql, postgresql


[[ballerina.log.modules]]
name = "wso2/icp_server"
level = "DEBUG"


